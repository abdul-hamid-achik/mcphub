name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/mcphub ./cmd/mcphub

      - name: Test
        run: go test -race ./...
