version: 1
name: mcphub_offload

intent: |
  `mcphub offload` is the second half of "register and offload": it removes the
  directly-configured copies of the servers mcphub proxies from each gateway-mode
  agent, leaving only the single `mcphub` gateway so the agent stops carrying every
  server's full tool list. It is a DRY RUN by default (no --write): it prints the
  plan and changes nothing. It removes only servers mcphub BOTH proxies (enabled)
  AND previously managed in that agent (tracked in the intelligence store since the
  0.3.0 safety change, so a user's hand-added entry sharing a proxied name is never
  clobbered), never the gateway itself, and skips any agent that doesn't yet have
  the gateway — so it can never strand an agent. Runs against an ISOLATED
  MCPHUB_CONFIG / MCPHUB_DB and temp agent files, so it never reads or writes the
  user's real harness configs.

  The preconditions model the real-world flow: a DIRECT-mode `sync --write`
  records codemap as managed and writes it into the agent; the user then adds
  the mcphub gateway by hand (keeping codemap) and switches the config to
  GATEWAY mode so codemap is now proxied. Only then does `offload` have an
  owned+proxied server to remove — without clobbering a hand-added entry.

target:
  cmd: ["./bin/mcphub", "offload"]
  cwd: "."
  env:
    MCPHUB_CONFIG: "/tmp/glyph-mcphub-offload/mcphub.yaml"
    MCPHUB_DB: "/tmp/glyph-mcphub-offload/mcphub.db"

terminal:
  cols: 100
  rows: 30
  profile: xterm-256color

preconditions:
  commands:
    - run: "test -x ./bin/mcphub"
      timeoutMs: 5000
    - run: "rm -rf /tmp/glyph-mcphub-offload && mkdir -p /tmp/glyph-mcphub-offload"
      timeoutMs: 5000
    # 1. Start the agent in DIRECT mode and sync: this writes codemap into
    #    claude.json AND records codemap as a managed entry in the store —
    #    the ownership offload keys off of.
    - run: "printf 'version: 1\\nservers:\\n  codemap: {command: codemap, args: [serve], enabled: true}\\nagents:\\n  claude: {type: claude, path: /tmp/glyph-mcphub-offload/claude.json, mode: direct}\\n' > /tmp/glyph-mcphub-offload/mcphub.yaml"
      timeoutMs: 5000
    - run: "printf '{}' > /tmp/glyph-mcphub-offload/claude.json"
      timeoutMs: 5000
    - run: "MCPHUB_CONFIG=/tmp/glyph-mcphub-offload/mcphub.yaml MCPHUB_DB=/tmp/glyph-mcphub-offload/mcphub.db ./bin/mcphub sync --write >/dev/null"
      timeoutMs: 10000
    # 2. The user now adds the mcphub gateway by hand (keeping codemap in place)
    #    and switches the config to GATEWAY mode so codemap becomes proxied.
    #    The store still owns codemap from step 1, so offload can remove it
    #    without clobbering a hand-added entry.
    - run: "printf '{\"mcpServers\":{\"mcphub\":{\"command\":\"mcphub\",\"args\":[\"mcp\",\"serve\"]},\"codemap\":{\"command\":\"codemap\",\"args\":[\"serve\"]}}}\\n' > /tmp/glyph-mcphub-offload/claude.json"
      timeoutMs: 5000
    - run: "printf 'version: 1\\nservers:\\n  codemap: {command: codemap, args: [serve], enabled: true}\\nagents:\\n  claude: {type: claude, path: /tmp/glyph-mcphub-offload/claude.json, mode: gateway}\\n  nogw: {type: claude, path: /tmp/glyph-mcphub-offload/nogw.json, mode: gateway}\\n' > /tmp/glyph-mcphub-offload/mcphub.yaml"
      timeoutMs: 5000
    # 3. nogw is gateway-mode but does NOT have the gateway yet — offload must
    #    skip it rather than strand it.
    - run: "printf '{\"mcpServers\":{\"codemap\":{\"command\":\"codemap\",\"args\":[\"serve\"]}}}\\n' > /tmp/glyph-mcphub-offload/nogw.json"
      timeoutMs: 5000
    # Sanity: claude now carries BOTH the mcphub gateway and the proxied codemap.
    - run: "jq -e '.mcpServers.codemap != null and .mcpServers.mcphub != null' /tmp/glyph-mcphub-offload/claude.json >/dev/null"
      timeoutMs: 5000
    # 4. Clear the backups the precondition syncs created, so the dry-run
    #    target starts with NO .bak files (the dry run must write none).
    - run: "rm -f /tmp/glyph-mcphub-offload/*.json.bak-*"
      timeoutMs: 5000

steps:
  - wait:
      process:
        exitCode: 0
      timeoutMs: 10000

outcomes:
  - id: clean_exit
    description: the dry run exits cleanly
    verify:
      process:
        exitCode: 0
  - id: prints_dry_run_notice
    description: the output labels itself a dry run
    verify:
      screen:
        contains: "Dry run"
  - id: plans_offload_of_proxied
    description: the plan shows the proxied codemap server would be offloaded
    verify:
      screen:
        contains: "codemap"
  - id: skips_agent_without_gateway
    description: an agent that lacks the mcphub gateway is skipped, never stranded
    verify:
      screen:
        contains: "no mcphub gateway found"
  - id: dry_run_keeps_agent_file
    description: the dry run did NOT edit the agent file — codemap is still present
    verify:
      command:
        run: "jq -e '.mcpServers.codemap != null' /tmp/glyph-mcphub-offload/claude.json >/dev/null"
  - id: dry_run_writes_no_backup
    description: a dry run writes NO timestamped .bak next to any agent file
    verify:
      command:
        run: "test -z \"$(find /tmp/glyph-mcphub-offload -name '*.json.bak-*' 2>/dev/null)\""
  - id: write_offloads_proxied_keeps_gateway
    description: --write removes the proxied codemap server but keeps the mcphub gateway
    verify:
      command:
        run: "MCPHUB_CONFIG=/tmp/glyph-mcphub-offload/mcphub.yaml MCPHUB_DB=/tmp/glyph-mcphub-offload/mcphub.db ./bin/mcphub offload --write && jq -e '.mcpServers.codemap == null and .mcpServers.mcphub != null' /tmp/glyph-mcphub-offload/claude.json >/dev/null"
  - id: write_saves_backup
    description: --write saves a timestamped .bak before editing the agent file
    verify:
      command:
        run: "test -n \"$(find /tmp/glyph-mcphub-offload -name 'claude.json.bak-*' 2>/dev/null)\""